<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>

<div class="login-container">

    <img src="/img/Inatel Branco.png" alt="Logo" class="logo">

    <form id="loginForm">

        <input
            type="text"
            id="usuario"
            placeholder="Usuário"
            required
        >

        <input
            type="password"
            id="senha"
            placeholder="Senha"
            required
        >

        <p id="mensagem"></p>

        <button type="submit">Entrar</button>

    </form>

</div>

<div class="info-container">
    <span class="info-icon">&#8505;</span>

    <div class="tooltip">
        Professor, a ideia é usar o próprio login do usuário na rede inatel aqui. <br> <br>
        Criei essa parte de login para ter uma imersão mais realista da aplicação. <br> <br>
        Usuário: 123456
        Senha: RaphaelCardoso
        Espero que goste!
    </div>
</div>

<script src="login.js"></script>

</body>
</html>
